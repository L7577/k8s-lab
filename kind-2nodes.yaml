# =============================================================================
# k8s-lab Kind 集群配置文件 - 轻量 2 节点集群（1CP + 1W）
# =============================================================================
# 适用于资源受限环境（如 4GB 内存的机器）
# 用法: kind create cluster --config kind-2nodes.yaml
# =============================================================================

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-lab
nodes:
  - role: control-plane
  - role: worker
