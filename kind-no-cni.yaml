# =============================================================================
# k8s-lab Kind 集群配置文件 - 禁用默认 CNI
# =============================================================================
# 用于安装自定义网络插件（如 Calico、Cilium、Flannel 等）
# 用法: kind create cluster --config kind-no-cni.yaml
# =============================================================================

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-custom-cni
networking:
  disableDefaultCNI: true
  podSubnet: "10.244.0.0/16"
nodes:
  - role: control-plane
  - role: worker
  - role: worker
