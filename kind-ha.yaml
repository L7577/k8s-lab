# =============================================================================
# k8s-lab Kind 集群配置文件 - HA 高可用集群
# =============================================================================
# 包含 3 个控制平面 + 2 个 Worker，模拟生产 HA 环境
# 用法: kind create cluster --config kind-ha.yaml
# =============================================================================

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-ha
nodes:
  - role: control-plane
  - role: control-plane
  - role: control-plane
  - role: worker
  - role: worker
networking:
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
